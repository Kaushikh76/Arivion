global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:4000"]
    metrics_path: /metrics

  - job_name: worker
    static_configs:
      - targets: ["worker:7000"]
    metrics_path: /metrics

  - job_name: verifier
    static_configs:
      - targets: ["verifier:7200"]
    metrics_path: /metrics

  - job_name: data-ingestor
    static_configs:
      - targets: ["data-ingestor:7100"]
    metrics_path: /metrics
